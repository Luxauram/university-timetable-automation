name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate multi-size icon.ico from icon.png
        run: |
          python -c "
          from PIL import Image
          img = Image.open('icon.png').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          img.save('icon.ico', format='ICO', sizes=sizes)
          print('icon.ico generated OK')
          "

      - name: Build executable
        run: >
          pyinstaller --onefile --windowed
          --name "University_Timetable_Automation"
          --collect-all pypdfium2
          --add-data "icon.png;."
          --icon icon.ico
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/University_Timetable_Automation.exe

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: >
          pyinstaller --onefile --windowed
          --name "University_Timetable_Automation"
          --collect-all pypdfium2
          --add-data "icon.png:."
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/University_Timetable_Automation

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: >
          pyinstaller --onefile --windowed
          --name "University_Timetable_Automation"
          --collect-all pypdfium2
          --add-data "icon.png:."
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/University_Timetable_Automation

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version from config.py
        id: version
        run: |
          VERSION=$(grep -oP 'APP_VERSION\s*:\s*str\s*=\s*"\K[^"]+' config.py)
          if [ -z "$VERSION" ]; then
            echo "ERROR: could not read APP_VERSION from config.py" >&2
            exit 1
          fi
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: v${VERSION}"

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release/windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: release/macos

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release/linux

      - name: Rename binaries with platform suffix
        run: |
          mv release/windows/University_Timetable_Automation.exe \
             release/University_Timetable_Automation_Windows.exe
          mv release/macos/University_Timetable_Automation \
             release/University_Timetable_Automation_macOS
          mv release/linux/University_Timetable_Automation \
             release/University_Timetable_Automation_Linux
          chmod +x release/University_Timetable_Automation_macOS
          chmod +x release/University_Timetable_Automation_Linux

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            Release **${{ steps.version.outputs.tag }}** — built automatically from `main`.

            | Platform | File |
            |---|---|
            | Windows | `University_Timetable_Automation_Windows.exe` |
            | macOS   | `University_Timetable_Automation_macOS` |
            | Linux   | `University_Timetable_Automation_Linux` |

            > On macOS and Linux, make the file executable before running:
            > `chmod +x University_Timetable_Automation_macOS`
          prerelease: false
          make_latest: true
          files: |
            release/University_Timetable_Automation_Windows.exe
            release/University_Timetable_Automation_macOS
            release/University_Timetable_Automation_Linux
